en: "A dark, elegant theme based on Catppuccin Mocha, extended with two extra depth layers (Abyss and Crust) to create real visual hierarchy between wallpaper, dock, toolbar and floating windows. Subtle Mauve borders, blur where supported, and high text contrast."
pt-BR: "Um tema escuro elegante baseado em Catppuccin Mocha, estendido com duas camadas adicionais de profundidade (Abyss e Crust) para criar hierarquia visual real entre wallpaper, dock, toolbar e janelas flutuantes. Bordas discretas em Mauve, blur onde suportado e alto contraste de texto."
pt-PT: "Um tema escuro elegante baseado em Catppuccin Mocha, alargado com duas camadas adicionais de profundidade (Abyss e Crust) para criar hierarquia visual real entre o fundo de ecrã, o dock, a barra de ferramentas e as janelas flutuantes."
es: "Un tema oscuro y elegante basado en Catppuccin Mocha, extendido con dos capas adicionales de profundidad (Abyss y Crust) para crear una jerarquía visual real entre el fondo, el dock, la barra de herramientas y las ventanas flotantes."
