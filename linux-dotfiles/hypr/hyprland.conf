# ============================================================
# Catppuccin Abyss — hyprland.conf
# Versão: Hyprland 0.44+
# ============================================================

################
### MONITORS ###
################
# Detecção automática — ajuste para valores específicos se precisar:
# monitor = HDMI-A-1, 2560x1440@144, 0x0, 1
monitor = , preferred, auto, 1

###############
### STARTUP  ###
###############
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = ags
exec-once = hyprpaper
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

#############
### INPUT  ###
#############
input {
    kb_layout    = us
    kb_variant   =
    kb_model     =
    kb_options   =
    kb_rules     =

    follow_mouse = 1
    sensitivity  = 0.0
    accel_profile = flat

    touchpad {
        natural_scroll       = true
        scroll_factor        = 0.8
        tap-to-click         = true
        drag_lock            = true
        disable_while_typing = true
    }
}

gestures {
    workspace_swipe              = true
    workspace_swipe_fingers      = 3
    workspace_swipe_distance     = 300
    workspace_swipe_cancel_ratio = 0.2
}

cursor {
    no_hardware_cursors = false
}

###############
### GENERAL ###
###############
general {
    gaps_in    = 6
    gaps_out   = 10

    border_size = 2

    # Gradiente Mauve → Blue (45°)
    col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(45475aaa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

##################
### DECORATION ###
##################
decoration {
    rounding          = 12
    active_opacity    = 1.0
    inactive_opacity  = 0.94
    fullscreen_opacity = 1.0

    shadow {
        enabled        = true
        range          = 24
        render_power   = 3
        color          = rgba(08080dee)
        color_inactive = rgba(08080d88)
        offset         = 0, 4
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        new_optimizations = true
        xray              = false
        noise             = 0.012
        contrast          = 1.0
        brightness        = 0.8
        vibrancy          = 0.15
        vibrancy_darkness = 0.0
        special           = true
        popups            = true
    }
}

####################
### LAYER RULES  ###
####################
layerrule = blur,        waybar
layerrule = blur,        ags
layerrule = blur,        walker
layerrule = ignorezero,  waybar
layerrule = ignorezero,  ags
layerrule = ignorezero,  walker

##################
### ANIMATIONS ###
##################
animations {
    enabled = true

    bezier = easeOutExpo,    0.16, 1,    0.3,  1
    bezier = easeInOutCubic, 0.65, 0,    0.35, 1
    bezier = spring,         0.34, 1.56, 0.64, 1
    bezier = linear,         0,    0,    1,    1

    animation = windows,          1, 5,  easeOutExpo,    slide
    animation = windowsOut,       1, 4,  easeInOutCubic, slide
    animation = windowsMove,      1, 5,  easeOutExpo
    animation = fade,             1, 4,  easeOutExpo
    animation = border,           1, 8,  default
    animation = borderangle,      1, 60, linear,         loop
    animation = workspaces,       1, 5,  spring,         slidevert
    animation = specialWorkspace, 1, 5,  easeOutExpo,    slidefadevert 15%
    animation = layers,           1, 4,  easeOutExpo,    fade
}

##############
### LAYOUT ###
##############
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
    smart_resizing = true
}

master {
    new_status = master
    new_on_top = true
    mfact      = 0.55
}

##############
### MISC   ###
##############
misc {
    force_default_wallpaper      = 0
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    mouse_move_enables_dpms      = true
    key_press_enables_dpms       = true
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
    enable_swallow               = true
    swallow_regex                = ^(kitty)$
    focus_on_activate            = true
    middle_click_paste           = false
}

##################################
### ENVIRONMENT VARIABLES      ###
##################################
env = XCURSOR_THEME,  Bibata-Modern-Classic
env = XCURSOR_SIZE,   24
env = HYPRCURSOR_THEME, Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,  24

# Qt
env = QT_QPA_PLATFORMTHEME,               qt6ct
env = QT_QPA_PLATFORM,                    wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR,        1

# GDK/GTK
env = GDK_BACKEND, wayland,x11

# SDL
env = SDL_VIDEODRIVER, wayland

# Clutter
env = CLUTTER_BACKEND, wayland

# Electron / VS Code
env = ELECTRON_OZONE_PLATFORM_HINT, wayland

# XDG
env = XDG_SESSION_TYPE,    wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland

# --- NVIDIA: descomente se usar GPU NVIDIA ---
# env = LIBVA_DRIVER_NAME,         nvidia
# env = GBM_BACKEND,               nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME, nvidia
# env = NVD_BACKEND,               direct

####################
### WINDOW RULES ###
####################
windowrulev2 = suppressevent maximize, class:.*

# Janelas flutuantes
windowrulev2 = float,  class:^(pavucontrol)$
windowrulev2 = float,  class:^(blueman-manager)$
windowrulev2 = float,  class:^(nm-connection-editor)$
windowrulev2 = float,  class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = float,  title:^(Open File)(.*)$
windowrulev2 = float,  title:^(Save As)(.*)$
windowrulev2 = float,  title:^(Picture-in-Picture)$
windowrulev2 = pin,    title:^(Picture-in-Picture)$
windowrulev2 = float,  class:^(org.gnome.Nautilus)$
windowrulev2 = size 960 620, class:^(org.gnome.Nautilus)$
windowrulev2 = center, class:^(org.gnome.Nautilus)$

# Opacidade
windowrulev2 = opacity 0.95 override 0.85 override, class:^(kitty)$
windowrulev2 = opacity 0.97 override 0.90 override, class:^(Code)$
windowrulev2 = opacity 0.97 override 0.90 override, class:^(code-oss)$

# Workspaces
windowrulev2 = workspace 1 silent, class:^(zen-browser)$
windowrulev2 = workspace 1 silent, class:^(firefox)$
windowrulev2 = workspace 2 silent, class:^(Code)$
windowrulev2 = workspace 2 silent, class:^(code-oss)$
windowrulev2 = workspace 3 silent, class:^(kitty)$
windowrulev2 = workspace 8 silent, class:^(discord)$
windowrulev2 = workspace 8 silent, class:^(vesktop)$

#####################
### WORKSPACES    ###
#####################
workspace = 1,  name:Browser,  monitor:, default:true
workspace = 2,  name:Code,     monitor:
workspace = 3,  name:Terminal, monitor:
workspace = 4,  name:Git,      monitor:
workspace = 5,  name:Database, monitor:
workspace = 6,  name:Docker,   monitor:
workspace = 7,  name:Docs,     monitor:
workspace = 8,  name:Chat,     monitor:
workspace = 9,  name:VM,       monitor:
workspace = 10, name:Free,     monitor:

#####################
### KEYBINDINGS  ####
#####################
$mainMod = SUPER
$terminal = kitty
$browser  = zen-browser
$editor   = code
$files    = nautilus
$launcher = walker

# --- Aplicações ---
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       E,      exec, $files
bind = $mainMod,       B,      exec, $browser
bind = $mainMod SHIFT, E,      exec, $editor
bind = $mainMod,       Space,  exec, $launcher

# --- Screenshots ---
bind =              , Print,      exec, grimblast copy screen
bind = SHIFT        , Print,      exec, grimblast copy area
bind = $mainMod SHIFT, S,         exec, grimblast copy area
bind = $mainMod     , Print,      exec, bash -c 'grimblast save screen ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png'

# --- Clipboard ---
bind = $mainMod, V, exec, cliphist list | walker --dmenu | cliphist decode | wl-copy

# --- Utilitários ---
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod,       Escape, exec, hyprlock

# --- Gerenciamento de janelas ---
bind = $mainMod,       Q,     killactive
bind = $mainMod,       F,     fullscreen, 0
bind = $mainMod SHIFT, F,     togglefloating
bind = $mainMod,       P,     pseudo
bind = $mainMod,       comma, togglesplit

# --- Foco (setas + HJKL) ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# --- Mover janelas ---
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, J,     movewindow, d

# --- Redimensionar ---
binde = $mainMod ALT, H,     resizeactive, -60 0
binde = $mainMod ALT, L,     resizeactive,  60 0
binde = $mainMod ALT, K,     resizeactive,  0 -60
binde = $mainMod ALT, J,     resizeactive,  0  60
binde = $mainMod ALT, left,  resizeactive, -60 0
binde = $mainMod ALT, right, resizeactive,  60 0
binde = $mainMod ALT, up,    resizeactive,  0 -60
binde = $mainMod ALT, down,  resizeactive,  0  60

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll entre workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1
bind = $mainMod, Tab,        workspace, e+1
bind = $mainMod SHIFT, Tab,  workspace, e-1

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, S, movetoworkspace,        special:scratchpad

# --- Mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Mídia ---
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume    @DEFAULT_AUDIO_SINK@   5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume    @DEFAULT_AUDIO_SINK@   5%-
bind = , XF86AudioMute,         exec, wpctl set-mute      @DEFAULT_AUDIO_SINK@   toggle
bind = , XF86AudioMicMute,      exec, wpctl set-mute      @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay,         exec, playerctl play-pause
bind = , XF86AudioNext,         exec, playerctl next
bind = , XF86AudioPrev,         exec, playerctl previous

# --- Brilho ---
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- AGS panels ---
bind = $mainMod, N, exec, ags -t notifications

# --- Sair ---
bind = $mainMod SHIFT, M, exit
