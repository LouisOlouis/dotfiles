# ============================================================
# Catppuccin Abyss — hyprlock.conf
# ============================================================

general {
    disable_loading_bar = true
    grace               = 0
    hide_cursor         = true
    no_fade_in          = false
}

background {
    monitor    =
    path       = ~/Pictures/wallpaper.png
    blur_size  = 8
    blur_passes = 3
    noise      = 0.012
    contrast   = 0.85
    brightness = 0.65
    vibrancy   = 0.15
    vibrancy_darkness = 0.0
}

# Relógio grande
label {
    monitor    =
    text       = cmd[update:1000] echo "$TIME"
    color      = rgba(cdd6f4ff)
    font_size  = 72
    font_family = JetBrainsMonoNerdFontPropo
    shadow_passes = 3
    shadow_size   = 10
    shadow_color  = rgba(08080dcc)

    position   = 0, 80
    halign     = center
    valign     = center
}

# Data
label {
    monitor    =
    text       = cmd[update:60000] date "+%A, %d de %B de %Y"
    color      = rgba(a6adc8ff)
    font_size  = 18
    font_family = JetBrainsMonoNerdFontPropo

    position   = 0, 0
    halign     = center
    valign     = center
}

# Input de senha
input-field {
    monitor    =
    size       = 300, 50
    outline_thickness = 2
    dots_size  = 0.3
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color  = rgba(cba6f7ff)
    inner_color  = rgba(181825cc)
    font_color   = rgba(cdd6f4ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##a6adc8">Senha</span>

    hide_input   = false
    rounding     = 12

    check_color  = rgba(a6e3a1ff)
    fail_color   = rgba(f38ba8ff)
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300

    position   = 0, -120
    halign     = center
    valign     = center
}

# Usuário
label {
    monitor    =
    text       = $USER
    color      = rgba(bac2deff)
    font_size  = 14
    font_family = JetBrainsMonoNerdFontPropo

    position   = 0, -70
    halign     = center
    valign     = center
}
